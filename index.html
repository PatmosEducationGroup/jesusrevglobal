<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Jesus Revolution Global</title>
  <meta name="description" content="Jesus Revolution Global" />
  <style>
    :root { --bg:#0b0b0c; --fg:#f4f2ec; --muted:#8a8780; --accent:#e0a83d; }
    * { margin:0; padding:0; box-sizing:border-box; }
    html, body { height:100%; }
    body {
      font-family: ui-sans-serif, system-ui, -apple-system, "Segoe UI", Roboto, sans-serif;
      background: radial-gradient(1200px 600px at 50% -10%, #15140f, var(--bg));
      color: var(--fg); display:grid; place-items:center; text-align:center; padding:2rem;
    }
    .kicker { letter-spacing:.35em; text-transform:uppercase; font-size:.75rem; color:var(--accent); margin-bottom:1.5rem; }
    h1 { font-size: clamp(2.5rem, 8vw, 5.5rem); line-height:1.02; font-weight:800; }
    .lead { max-width:34rem; margin:1.5rem auto 0; color:var(--muted); font-size:1.1rem; line-height:1.6; }
  </style>
</head>
<body>
  <main>
    <p class="kicker">Coming soon</p>
    <h1>Jesus Revolution<br>Global</h1>
    <p class="lead">A movement of real testimonies and the gospel reaching the nations. The site is on its way.</p>
  </main>
</body>
</html>
